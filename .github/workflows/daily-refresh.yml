name: Daily Dashboard Refresh

on:
  schedule:
    # Runs twice daily: 07:00 UAE (03:00 UTC) and 19:00 UAE (15:00 UTC)
    - cron: '0 3,15 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run refresh script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/refresh.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use PAT so the push triggers deploy.yml (bot-token pushes don't)
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT_FOR_REFRESH }}@github.com/vaibhavgupta027/manoj-dashboard.git
          git add data.json
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data $(date -u '+%Y-%m-%d')"
          git push
